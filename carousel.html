<!DOCTYPE html>
<html>
 <head>
  <title>

  </title>
  <style>
   body{
    background-color: rgb(20,20,20);
   }
   .wrap{
    width: 100%;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    
   }


   .box-div{
    display: flex;
    gap: 5px;
    width: 100%;
    overflow-x: auto;
    scroll-behavior: smooth;
   }

   .box-div::-webkit-scrollbar{
    display: none;
   }
   .box-div::scroll-button(right){
    content: ">";
    border: none;
    background-color: blueviolet;
    height: 100%;
    color: white;
    padding: 20px;
    margin-left:-20px;
    border-radius: 50%;
   }


   .box-div::scroll-button(left){
    content: "<";
    border: none;
    background-color: blueviolet;
    height: 100%;
    color: white;
    padding: 20px;
    margin-left:-20px;
    border-radius: 50%;
   }
   .box{
    background-color: aqua;
    width: 250px;
    height: 180px;
    flex: 0 0 20em;
   
   
   }


   
  </style>
 </head>

 <body>



  <div class="wrap">
   <div class="box-div">
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
   </div>
  </div>

 </body>
</html>
