<!DOCTYPE html>
<html lang="en">
<head>

 <title>Document</title>

 <style>
  .box {
      width: 100px;
      height: 100px;
      background-color: blue;
      animation: zoom-in-out 0.2s  ;
    }

 @keyframes zoom-in-out {
   0% {  transform: scale(1.25);   }
   100%       {  transform: scale(1); }
 }
 </style>
</head>
<body>

 <div class="box"></div>

 
</body>
</html>
